<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>書房</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:100%; height:100%; overflow:hidden; background:#f5f2ec;
  font-family:'Noto Serif TC','SimSun','Songti SC',serif; color:#111; }

/* Layout */
#app { width:100%; height:100%; display:flex; flex-direction:column; }
#topbar { display:flex; justify-content:space-between; align-items:center;
  padding:9px 14px; background:#fff; border-bottom:2px solid #111; flex-shrink:0; }
#main { flex:1; display:grid; grid-template-columns:1fr 1px 1fr; overflow:hidden; }
#divider { background:#111; }
#left, #right { padding:11px 13px; display:flex; flex-direction:column; gap:10px; overflow:hidden; }
#bottombar { display:flex; justify-content:space-between; align-items:center;
  padding:5px 14px; background:#fff; border-top:1px solid #ddd;
  font-size:8px; color:#bbb; font-family:'Courier New',monospace; flex-shrink:0; }

/* Top bar */
#brand .sub  { font-size:8px; letter-spacing:4px; color:#bbb; }
#brand .main { font-size:19px; font-weight:900; letter-spacing:1px; }
#topright { display:flex; flex-direction:column; align-items:flex-end; gap:2px; }
#clock { font-size:38px; font-family:'Courier New',monospace; font-weight:700;
  letter-spacing:2px; line-height:1; }
#datestr { font-size:11px; letter-spacing:1px; }
#syncstatus { font-size:9px; color:#aaa; }
#syncerr { font-size:9px; color:#c00; cursor:pointer; }
#btn-fullscreen { font-size:10px; background:transparent; border:1px solid #ddd;
  color:#999; padding:3px 8px; font-family:inherit; letter-spacing:1px; margin-top:4px; }

/* Sections */
.section-label { font-size:9px; letter-spacing:2px; font-weight:700; text-transform:uppercase; }
.divider-line  { border-top:1px solid #e0e0e0; flex-shrink:0; }

/* Progress bar */
.pbar-wrap { background:#ddd; border:1px solid #bbb; }
.pbar-fill  { background:#111; height:100%; }

/* Tabs */
#tabs { display:flex; border-bottom:1px solid #ddd; flex-shrink:0; }
.tab { flex:1; padding:4px 2px; font-size:9px; background:transparent; color:#888;
  border:none; font-family:inherit; border-right:1px solid #ddd; cursor:pointer; }
.tab.active { background:#111; color:#fff; }

/* Book list */
#booklist { overflow-y:auto; flex:1; }
.bookcard { border-bottom:1px solid #e8e8e8; padding:8px 0; cursor:pointer; }
.bookcard:active { opacity:0.5; }
.bookcard-top { display:flex; justify-content:space-between; align-items:baseline; gap:4px; }
.bookcard-title { font-weight:700; font-size:13px; flex:1;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.bookcard-badge { font-size:10px; border:1px solid #bbb; padding:1px 4px;
  flex-shrink:0; letter-spacing:0.5px; }
.bookcard-meta { display:flex; justify-content:space-between; margin-top:2px; }
.bookcard-author { font-size:11px; color:#777; }
.bookcard-tap { font-size:9px; color:#bbb; }
.bookcard-progress { margin-top:4px; }
.bookcard-pct { display:flex; justify-content:space-between;
  font-size:10px; color:#888; margin-bottom:3px; }
.empty { font-size:11px; color:#bbb; font-style:italic; padding:10px 0; }

/* Highlight box */
#hlbox { border:1px solid #ddd; padding:10px 11px; background:#fff; flex-shrink:0; }
#hlbox .lbl { font-size:9px; letter-spacing:3px; color:#bbb; margin-bottom:6px; }
#hltext { font-size:13px; line-height:1.85; border-left:3px solid #111; padding-left:8px; }
#hlfoot { display:flex; justify-content:space-between; align-items:center; margin-top:6px; }
#hlbook { font-size:9px; color:#999; }
#btn-nexthl { font-size:9px; background:transparent; border:1px solid #ddd;
  padding:2px 7px; color:#999; font-family:inherit; }

/* Stats grid */
#statgrid { display:grid; grid-template-columns:1fr 1fr; gap:7px; }
.statbox { border:1px solid #e8e8e8; padding:7px 9px; background:#fff; }
.statbox .lbl { font-size:8px; color:#bbb; letter-spacing:1px; margin-bottom:3px; }
.statbox .val { font-size:17px; font-weight:700; font-family:'Courier New',monospace; }

/* Todos */
#todolist { flex:1; }
.todo { display:flex; align-items:center; gap:8px; padding:6px 0;
  border-bottom:1px dashed #e8e8e8; }
.todo-check { font-size:13px; font-family:monospace; flex-shrink:0; cursor:pointer; }
.todo-text  { font-size:12px; line-height:1.5; flex:1; cursor:pointer; }
.todo-text.done { color:#ccc; text-decoration:line-through; }
.todo-edit-input { flex:1; background:transparent; border:none;
  border-bottom:1px solid #aaa; color:inherit; font-size:12px;
  font-family:inherit; outline:none; padding:1px 2px; }
.todo-del { margin-left:auto; color:#ccc; cursor:pointer; font-size:13px;
  flex-shrink:0; padding:0 3px; line-height:1; }
.todo-del:hover { color:#e05555; }
.todo-add { background:transparent; border:none; color:#bbb; font-size:11px;
  cursor:pointer; padding:7px 0 2px; font-family:inherit; display:block;
  width:100%; text-align:left; }
.todo-add:hover { color:#888; }

/* Year goal */
#goalrow { display:flex; justify-content:space-between; margin-bottom:5px; }
#goalsub { font-size:9px; color:#999; margin-top:3px; }

/* Diary */
#diary-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:5px; }
#diary-meta { display:flex; gap:8px; align-items:center; }
#diary-count { font-size:9px; color:#bbb; }
#diary-count.warn { color:#c00; }
#btn-history { font-size:9px; background:transparent; border:none;
  color:#999; font-family:inherit; padding:0; cursor:pointer; }
#diary-dateline { display:flex; justify-content:space-between; font-size:9px;
  color:#bbb; margin-bottom:4px; }
#diary-textarea { width:100%; height:82px; background:#fff; border:1px solid #ddd;
  padding:8px 10px; font-size:12px; line-height:1.7; resize:none;
  font-family:'Noto Serif TC','SimSun',serif; color:#111; }
#diary-err { font-size:9px; color:#c00; margin-top:3px; }
#diary-btns { display:block; margin-top:5px; }
.diary-btn { padding:7px 0; font-size:10px; letter-spacing:1px;
  font-family:inherit; border:none; cursor:pointer; }
#diary-target { font-size:8px; color:#ccc; text-align:right; margin-top:3px; }
#history-list { max-height:155px; overflow-y:auto; }
.hentry { border-bottom:1px dashed #e8e8e8; padding:6px 0; }
.hentry-date { font-size:9px; color:#bbb; margin-bottom:2px; }
.hentry-text { font-size:11px; color:#555; line-height:1.6; }

/* Setup */
#setup { width:100%; height:100%; display:flex; flex-direction:column;
  align-items:center; justify-content:center; padding:24px; }
#setup-box { width:100%; max-width:340px; background:#fff;
  border:1px solid #ddd; padding:22px; }
#steps { display:flex; align-items:center; margin-bottom:20px; }
.step-dot { width:24px; height:24px; border-radius:50%; text-align:center;
  line-height:24px; font-size:11px; font-family:monospace; flex-shrink:0; }
.step-dot.active  { background:#111; color:#fff; }
.step-dot.done    { background:#111; color:#fff; }
.step-dot.pending { background:#e8e8e8; color:#aaa; }
.step-line { flex:1; height:1px; margin:0 6px; margin-bottom:12px; }
.step-line.done   { background:#111; }
.step-line.pending { background:#e8e8e8; }
.step-label { font-size:8px; text-align:center; margin-top:3px; }
.step-label.active { color:#111; }
.step-label.other  { color:#aaa; }
.setup-title { font-size:13px; font-weight:700; margin-bottom:4px; }
.setup-desc  { font-size:10px; color:#999; margin-bottom:14px; line-height:1.8; }
.setup-input { width:100%; padding:10px 12px; font-size:12px;
  border:1px solid #ddd; font-family:monospace; background:#fafafa;
  margin-bottom:10px; display:block; }
.setup-btn { width:100%; padding:11px 0; font-size:12px; letter-spacing:2px;
  border:none; font-family:inherit; cursor:pointer; margin-top:4px; }
.setup-btn.on  { background:#111; color:#fff; }
.setup-btn.off { background:#e0e0e0; color:#aaa; cursor:default; }
.setup-back { width:100%; padding:9px 0; font-size:11px; background:transparent;
  color:#888; border:1px solid #ddd; font-family:inherit; margin-top:6px; cursor:pointer; }
#folder-list { border:1px solid #eee; max-height:200px; overflow-y:auto; margin-bottom:12px; }
.folder-item { padding:10px 12px; cursor:pointer; font-size:12px;
  border-bottom:1px solid #f5f5f5; display:flex; justify-content:space-between; align-items:center; }
.folder-item.selected { background:#111; color:#fff; }
.folder-count { font-size:10px; opacity:0.5; }
#setup-note { font-size:9px; color:#ccc; margin-top:14px; text-align:center; line-height:1.8; }

::-webkit-scrollbar { width:3px; }
::-webkit-scrollbar-thumb { background:#ccc; }
</style>
</head>
<body>
<div id="app"></div>

<script>
// ── API helpers ───────────────────────────────────────────
const WEREAD_GATEWAY = "https://ima-proxy.reverb-cheng.workers.dev/weread";
const SKILL_VERSION = "1.0.3";
async function wereadGateway(apiName, key, extra={}) {
  const r = await fetch(WEREAD_GATEWAY, {
    method:"POST",
    headers:{ "Authorization":"Bearer "+key, "Content-Type":"application/json" },
    body: JSON.stringify({ api_name:apiName, skill_version:SKILL_VERSION, _wrkey:key, ...extra })
  });
  const text = await r.text();
  if (!r.ok) throw new Error("HTTP "+r.status+" — "+text.slice(0,300));
  try { return JSON.parse(text); }
  catch(e) { throw new Error("解析失敗: "+text.slice(0,300)); }
}
async function fetchBookshelf(key) {
  const d = await wereadGateway("/shelf/sync", key, { synckey:0, lectureSynckey:0 });
  return (d.books||[]).map(b=>({
    id: b.bookId,
    title: b.title||"未知",
    author: b.author||"",
    status: b.finishReading===1?"done": b.readUpdateTime>0?"reading":"want",
    progress: 0,
    readingTime: b.readingTime||0,
    readUpdateTime: b.readUpdateTime||0,
  }));
}
async function fetchStats(key) {
  const [overall, weekly] = await Promise.all([
    wereadGateway("/readdata/detail", key, { mode:"overall" }),
    wereadGateway("/readdata/detail", key, { mode:"weekly" }),
  ]);
  return { totalDays:overall.readDays||0, weekDays:weekly.readDays||0,
           totalTime:overall.totalReadTime||0,
           weekTime:weekly.totalReadTime||0, totalBooks:overall.totalBookCount||0 };
}
async function fetchHighlights(key) {
  const nb = await wereadGateway("/user/notebooks", key);
  const list = (nb.books||[]).filter(b=>(b.noteCount||0)+(b.bookmarkCount||0)>0);
  const total = list.reduce((s,b)=>s+(b.noteCount||0)+(b.bookmarkCount||0),0);
  if(!list.length) return { items:[], total:0 };
  const entry = list[Math.floor(Math.random()*Math.min(list.length,5))];
  const bookId = entry.bookId || entry.book?.bookId;
  if(!bookId) return { items:[], total };
  const d = await wereadGateway("/book/bookmarklist", key, {bookId});
  const items = (d.updated||[]).filter(m=>m.type===1)
    .sort(()=>Math.random()-0.5).slice(0,8)
    .map(m=>({ text:m.markText, book:m.bookTitle||entry.title||entry.book?.title||"" }));
  return { items, total };
}

const IMA_BASE = "https://ima-proxy.reverb-cheng.workers.dev";
async function imaFetch(ep, cid, key, body) {
  let r;
  try {
    r = await fetch(IMA_BASE+"/"+ep, {
      method:"POST",
      headers:{ "Content-Type":"application/json",
                 Authorization:"Bearer "+key, "X-Client-ID":cid },
      body: JSON.stringify({ clientID: cid, apiKey: key, ...body })
    });
  } catch(e) {
    throw new Error("網絡錯誤: "+e.message);
  }
  const text = await r.text();
  if (!r.ok) throw new Error("HTTP "+r.status+" — "+text.slice(0,300));
  try { return JSON.parse(text); }
  catch(e) { throw new Error("解析失敗: "+text.slice(0,300)); }
}
async function fetchFolders(cid, key) {
  const d = await imaFetch("list_note_folder_by_cursor", cid, key, { cursor:"0", limit:50 });
  return (d.folders||[]).map(f=>({
    id: f.basic_info?.folder_id||f.folder_id,
    name: f.basic_info?.name||f.name,
    count: f.basic_info?.note_number||0,
  })).filter(f=>f.name);
}
async function pushToIma(cid, key, fid, label, text) {
  const md = "# 📖 每日一頁｜"+label+"\n\n"+text+"\n";
  const body = { content_format:1, content:md };
  if(fid) body.folder_id = fid;
  return await imaFetch("import_doc", cid, key, body);
}

// ── Utils ─────────────────────────────────────────────────
function todayKey() {
  const d=new Date();
  return "diary_"+d.getFullYear()+"_"+pad(d.getMonth()+1)+"_"+pad(d.getDate());
}
function todayLabel() {
  const d=new Date(), days=["日","一","二","三","四","五","六"];
  return d.getFullYear()+"."+pad(d.getMonth()+1)+"."+pad(d.getDate())+" 週"+days[d.getDay()];
}
function dayLabel(key) {
  const p=key.replace("diary_","").split("_"), d=new Date(p[0],p[1]-1,p[2]);
  const days=["日","一","二","三","四","五","六"];
  return p[1]+"/"+p[2]+" 週"+days[d.getDay()];
}
function pad(n){ return String(n).padStart(2,"0"); }
function fmtMin(m){ const h=Math.floor(m/60),mm=m%60; return h>0?h+"h"+(mm>0?mm+"m":""):mm+"m"; }
function loadConfig(){ try{ return JSON.parse(localStorage.getItem("dashboard_config")||"null"); }catch{ return null; } }
function saveConfig(c){ localStorage.setItem("dashboard_config",JSON.stringify(c)); }
const DEFAULT_TODOS=[{id:0,text:"今日閱讀 30 分鐘"},{id:1,text:"整理本週書摘"},{id:2,text:"喝夠八杯水"}];
function loadTodos(){ try{ const s=localStorage.getItem("todos_list"); return s?JSON.parse(s):DEFAULT_TODOS; }catch{ return DEFAULT_TODOS; } }
function saveTodos(t){ localStorage.setItem("todos_list",JSON.stringify(t)); }

// ── State ─────────────────────────────────────────────────
let S = {
  config: loadConfig(),
  books:[], stats:null, highlights:[], highlightTotal:0, hlIndex:0,
  wereadLoading:false, wereadError:"",
  activeTab:"reading",
  diaryText: "", diarySaved:false, imaSynced:false, imaSyncing:false, imaError:"",
  showHistory:false, diaryHistory:[],
  isFullscreen:false, clock:"",
  // setup
  step:1, wrKey:"", imaCid:"", imaKey:"", folders:[], selFolder:null,
  setupLoading:false, setupError:"",
  // todos
  todos: loadTodos(),
  todoEditId: null,
};
const MAX_CHARS=500;
const YEAR_GOALS={2025:12, 2026:12, 2027:12};

function getState(){ return S; }
function setState(patch){
  S=Object.assign({},S,patch);
  render();
}

// ── Clock ─────────────────────────────────────────────────
function updateClock(){
  const d=new Date(), days=["星期日","星期一","星期二","星期三","星期四","星期五","星期六"];
  const time=pad(d.getHours())+":"+pad(d.getMinutes());
  const date=d.getFullYear()+"."+pad(d.getMonth()+1)+"."+pad(d.getDate())+" "+days[d.getDay()];
  setState({ clockTime:time, clockDate:date });
}
updateClock();
// align to next minute
const msToNext=(60-new Date().getSeconds())*1000;
setTimeout(()=>{ updateClock(); setInterval(updateClock,60000); }, msToNext);

// ── WakeLock ──────────────────────────────────────────────
let wl=null;
async function requestWL(){
  try{ if("wakeLock" in navigator) wl=await navigator.wakeLock.request("screen"); }catch(_){}
}
requestWL();
document.addEventListener("visibilitychange",()=>{ if(document.visibilityState==="visible") requestWL(); });

// ── Fullscreen ────────────────────────────────────────────
document.addEventListener("fullscreenchange",()=>{
  setState({ isFullscreen:!!document.fullscreenElement });
});
function toggleFS(){
  if(!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});
  else document.exitFullscreen();
}

// ── Anti-ghosting refresh every 30min ─────────────────────
setInterval(()=>{
  document.body.style.filter="invert(1)";
  setTimeout(()=>{ document.body.style.filter=""; },200);
},30*60*1000);

// ── Diary local storage ───────────────────────────────────
function loadDiaryLocal(){
  const key=todayKey();
  const text=localStorage.getItem(key)||"";
  const idx=JSON.parse(localStorage.getItem("diary_index")||"[]");
  const hist=idx.filter(k=>k!==key).slice(0,7)
    .map(k=>({ key:k, text:localStorage.getItem(k)||"" }))
    .filter(e=>e.text);
  setState({ diaryText:text, diarySaved:!!text, diaryHistory:hist });
}
loadDiaryLocal();

function saveDiaryLocal(text){
  const key=todayKey();
  localStorage.setItem(key,text);
  const idx=JSON.parse(localStorage.getItem("diary_index")||"[]");
  if(!idx.includes(key)){ idx.unshift(key); localStorage.setItem("diary_index",JSON.stringify(idx.slice(0,30))); }
}

// ── Fetch weread ──────────────────────────────────────────
function doFetchWeread(cfg){
  if(!cfg?.wereadKey) return;
  setState({ wereadLoading:true, wereadError:"" });
  Promise.all([fetchBookshelf(cfg.wereadKey), fetchStats(cfg.wereadKey), fetchHighlights(cfg.wereadKey).catch(()=>({items:[],total:0}))])
    .then(([books,stats,hlResult])=>{ setState({ books,stats,highlights:hlResult.items,highlightTotal:hlResult.total,wereadLoading:false }); })
    .catch((e)=>{ setState({ wereadError:"微信讀書連接失敗，點擊重試 ("+e.message+")", wereadLoading:false }); });
}
if(S.config) doFetchWeread(S.config);
setInterval(()=>{ if(S.config) doFetchWeread(S.config); },60*60*1000);

// ── Render helpers ────────────────────────────────────────
function el(tag,attrs,...children){
  const e=document.createElement(tag);
  for(const [k,v] of Object.entries(attrs||{})){
    if(k==="className") e.className=v;
    else if(k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="style" && typeof v==="object") Object.assign(e.style,v);
    else e.setAttribute(k,v);
  }
  for(const c of children){
    if(c==null||c===false) continue;
    e.appendChild(typeof c==="string"||typeof c==="number" ? document.createTextNode(c) : c);
  }
  return e;
}
function pbar(val,h=5){
  const w=el("div",{className:"pbar-wrap",style:{height:h+"px"}});
  w.appendChild(el("div",{className:"pbar-fill",style:{width:Math.min(100,Math.max(0,val))+"%",height:"100%"}}));
  return w;
}

// ── Views ─────────────────────────────────────────────────
function renderSetup(){
  const {step, setupLoading, setupError} = S;

  const steps = ["微信讀書","IMA 筆記"];
  const stepsEl = el("div",{id:"steps"});
  steps.forEach((lbl,i)=>{
    const n = i+1;
    const dot = el("div",{className:"step-dot "+(step>n?"done":step===n?"active":"pending")}, step>n?"✓":String(n));
    const col = el("div",{style:{textAlign:"center",flexShrink:"0"}}, dot,
      el("div",{className:"step-label "+(step===n?"active":"other")},lbl));
    stepsEl.appendChild(col);
    if(i<1) stepsEl.appendChild(el("div",{className:"step-line "+(step>n?"done":"pending")}));
  });

  let content2;

  if(step===1){
    const inp = el("input",{type:"password",className:"setup-input",placeholder:"wrk-xxxxxxxxxxxxxxxx"});
    inp.value = S.wrKey||"";
    inp.addEventListener("input", function(){ S.wrKey = inp.value; });
    const errDiv = el("div",{style:{fontSize:"10px",color:"#c00",marginBottom:"8px",display:setupError?"block":"none"}}, setupError);
    const btn = el("button",{className:"setup-btn on"}, "下一步 →");
    btn.addEventListener("click", function(){
      const val = inp.value.trim();
      if(!val){ setState({setupError:"請輸入微信讀書 API Key"}); return; }
      S.wrKey = val;
      setState({step:2, setupError:""});
    });
    content2 = el("div",{},
      el("div",{className:"setup-title"},"微信讀書 API Key"),
      el("div",{className:"setup-desc"},"微信讀書 App →「我」→「設置」→「Skill」→ 生成 API Key"),
      inp, errDiv, btn);

  } else {
    const i1 = el("input",{type:"text",className:"setup-input",placeholder:"Client ID"});
    const i2 = el("input",{type:"password",className:"setup-input",placeholder:"API Key"});
    i1.value = S.imaCid||"";
    i2.value = S.imaKey||"";
    i1.addEventListener("input", function(){ S.imaCid = i1.value; });
    i2.addEventListener("input", function(){ S.imaKey = i2.value; });
    const errDiv = el("div",{style:{fontSize:"10px",color:"#c00",marginBottom:"8px",display:setupError?"block":"none"}}, setupError);
    const btn = el("button",{className:"setup-btn "+(setupLoading?"off":"on")}, setupLoading?"連接中…":"連接並開始使用 ✓");
    if(setupLoading) btn.disabled = true;
    btn.addEventListener("click", async function(){
      const cidVal = i1.value.trim();
      const keyVal = i2.value.trim();
      const wrVal  = S.wrKey||"";
      if(!cidVal||!keyVal){
        setState({setupError:"請填寫 Client ID 和 API Key"});
        return;
      }
      S.imaCid = cidVal;
      S.imaKey = keyVal;
      setState({setupLoading:true, setupError:""});
      try{
        await fetchFolders(cidVal, keyVal);
        const cfg={wereadKey:wrVal,imaClientId:cidVal,imaKey:keyVal,imaFolderId:"",imaFolderName:"IMA 筆記"};
        saveConfig(cfg);
        S.config=cfg;
        doFetchWeread(cfg);
        render();
      }catch(e){
        setState({setupLoading:false, setupError:"錯誤: "+e.message});
      }
    });
    const back = el("button",{className:"setup-back"},"← 返回");
    back.addEventListener("click",()=>setState({step:1, setupError:"", setupLoading:false}));
    content2 = el("div",{},
      el("div",{className:"setup-title"},"IMA 筆記連接"),
      el("div",{className:"setup-desc"},"ima.qq.com/agent-interface 獲取 Client ID 和 API Key"),
      i1, i2, errDiv, btn, back);
  }

  return el("div",{id:"setup"},
    el("div",{style:{fontSize:"9px",letterSpacing:"4px",color:"#bbb",marginBottom:"6px"}},"READING DASHBOARD"),
    el("div",{style:{fontSize:"26px",fontWeight:"900",marginBottom:"24px",letterSpacing:"1px"}},"書房"),
    el("div",{id:"setup-box"}, stepsEl, content2),
    el("div",{id:"setup-note"},"所有 Key 僅儲存在本機瀏覽器",el("br",{}),"不經過任何服務器"));
}


function renderMain(){
  const {books,stats,highlights,highlightTotal,hlIndex,wereadLoading,wereadError,
         activeTab,diaryText,diarySaved,imaSynced,imaSyncing,imaError,
         showHistory,diaryHistory,isFullscreen,clockTime,clockDate,config,todos,todoEditId}=S;

  const byRecent=(a,b)=>(b.readUpdateTime||0)-(a.readUpdateTime||0);
  const reading=books.filter(b=>b.status==="reading").sort(byRecent);
  const want=books.filter(b=>b.status==="want").sort(byRecent);
  const done=books.filter(b=>b.status==="done").sort(byRecent);
  const tabBooks={reading,want,done};
  const thisYear=new Date().getFullYear();
  const yearGoal=YEAR_GOALS[thisYear]||12;
  const yearDone=done.filter(b=>b.readUpdateTime>0&&new Date(b.readUpdateTime*1000).getFullYear()===thisYear).length;
  const goalPct=Math.min(100,Math.round((yearDone/yearGoal)*100));
  const hl=highlights[hlIndex]||null;

  // ── Topbar ──
  const topbar=el("div",{id:"topbar"},
    el("div",{style:{display:"flex",alignItems:"center",gap:"10px"}},
      el("div",{id:"brand"},
        el("div",{className:"sub"},"READING DASHBOARD"),
        el("div",{className:"main"},"書房")),
      el("button",{id:"btn-fullscreen",onClick:toggleFS},
        isFullscreen?"⊡ 退出":"⊞ 全屏")),
    el("div",{id:"topright"},
      wereadLoading?el("span",{id:"syncstatus"},"同步中…"):"",
      wereadError?el("span",{id:"syncerr",onClick:()=>doFetchWeread(config)},wereadError):"",
      !wereadLoading&&!wereadError?el("span",{style:{fontSize:"8px",color:"#ddd"}},"每小時自動更新"):"",
      el("div",{id:"clock"},clockTime||"--:--"),
      el("div",{id:"datestr"},clockDate||"")));

  // ── Left column ──
  // Year goal
  const goalSec=el("div",{},
    el("div",{id:"goalrow"},
      el("span",{className:"section-label"},thisYear+" 年度目標"),
      el("span",{style:{fontSize:"10px"}},yearDone+" / "+yearGoal+" 本")),
    pbar(goalPct,6),
    el("div",{id:"goalsub"},stats
      ?"累計 "+Math.round((stats.totalTime||0)/3600)+"h · 共 "+(stats.totalBooks||done.length)+" 本"
      :"還差 "+Math.max(0,yearGoal-yearDone)+" 本"));

  // Tabs
  const tabLabels={reading:"在讀("+reading.length+")",want:"想讀("+want.length+")",done:"已讀("+done.length+")"};
  const tabs=el("div",{id:"tabs"});
  ["reading","want","done"].forEach(t=>{
    tabs.appendChild(el("button",{className:"tab"+(activeTab===t?" active":""),
      onClick:()=>setState({activeTab:t})},tabLabels[t]));
  });

  // Book list
  const bl=el("div",{id:"booklist"});
  if(wereadLoading){ bl.appendChild(el("div",{className:"empty"},"載入中…")); }
  else if(!tabBooks[activeTab].length){ bl.appendChild(el("div",{className:"empty"},"暫無書目")); }
  else tabBooks[activeTab].forEach(book=>{
    const card=el("div",{className:"bookcard",onClick:()=>{
      const a=document.createElement("a");
      a.href="weread://book/reader?bookId="+book.id;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
    }},
      el("div",{className:"bookcard-top"},
        el("span",{className:"bookcard-title"},book.title),
        el("span",{className:"bookcard-badge"},
          {reading:"在讀",want:"想讀",done:"已讀"}[book.status])),
      el("div",{className:"bookcard-meta"},
        el("span",{className:"bookcard-author"},book.author),
        el("span",{className:"bookcard-tap"},"點擊閱讀 ›")));
    if(book.status==="reading"){
      const pg=el("div",{className:"bookcard-progress"},
        el("div",{className:"bookcard-pct"},
          el("span",{},"已讀 "+book.progress+"%"),
          book.readingTime>0?el("span",{},fmtMin(Math.round(book.readingTime/60))):""),
        pbar(book.progress));
      card.appendChild(pg);
    }
    bl.appendChild(card);
  });

  const bookSec=el("div",{style:{flex:"1",display:"flex",flexDirection:"column",minHeight:"0"}},
    tabs, bl);

  // Diary
  let diaryContent;
  if(showHistory){
    const hist=el("div",{id:"history-list"});
    if(!diaryHistory.length){
      hist.appendChild(el("div",{style:{fontSize:"10px",color:"#bbb",fontStyle:"italic"}},"暫無往期記錄"));
    } else {
      diaryHistory.forEach(e=>{
        hist.appendChild(el("div",{className:"hentry"},
          el("div",{className:"hentry-date"},dayLabel(e.key)),
          el("div",{className:"hentry-text"},e.text.length>55?e.text.slice(0,55)+"…":e.text)));
      });
    }
    diaryContent=hist;
  } else {
    const statusStr=imaSynced?"✓ 已存IMA":"";
    // Use a stable textarea that doesn't re-render on input (fixes mobile keyboard dismiss)
    const ta=el("textarea",{id:"diary-textarea",placeholder:"今天有什麼想記下來的…"});
    ta.value=diaryText;
    if(imaSynced){
      // After saving: show content as read-only
      ta.readOnly=true;
      ta.style.background="#f9f9f9";
      ta.style.color="#555";
      ta.style.border="1px solid #eee";
      ta.style.cursor="default";
    }
    // Only enforce max chars, never trigger setState on input
    ta.addEventListener("input",e=>{
      if(imaSynced){ e.target.value=diaryText; return; }
      if(e.target.value.length>MAX_CHARS) e.target.value=e.target.value.slice(0,MAX_CHARS);
      // Update char count display directly in DOM
      const cnt=document.getElementById("diary-count");
      if(cnt){ cnt.textContent=e.target.value.length+"/"+MAX_CHARS;
               cnt.className="diary-count"+(e.target.value.length>MAX_CHARS*0.9?" warn":""); }
    });
    const getVal=()=>{
      const el2=document.getElementById("diary-textarea");
      return el2?el2.value:ta.value;
    };

    const btnIma=el("button",{className:"diary-btn",
      style:{background:imaSynced?"transparent":"#444",
             color:imaSynced?"#bbb":"#fff",
             border:imaSynced?"1px solid #ddd":"1px solid #444",
             cursor:(imaSynced||imaSyncing)?"default":"pointer"},
      onClick:async()=>{
        const val=getVal();
        if(!val.trim()||imaSynced||imaSyncing||!config?.imaClientId) return;
        setState({imaSyncing:true,imaError:""});
        try{
          const imaResult=await pushToIma(config.imaClientId,config.imaKey,config.imaFolderId,todayLabel(),val);
          saveDiaryLocal(val);
          S.diaryText=val;
          setState({imaSynced:true,imaSyncing:false,imaError:""});
        }catch{
          setState({imaError:"IMA 同步失敗，Key 可能已過期",imaSyncing:false});
        }
      }},imaSyncing?"同步中…":imaSynced?"✓ 已存IMA":"存入 IMA");
    diaryContent=el("div",{},
      el("div",{id:"diary-dateline"},
        el("span",{},todayLabel()),
        el("span",{},statusStr)),
      ta,
      imaError?el("div",{id:"diary-err"},imaError):"",
      el("div",{id:"diary-btns"},btnIma),
      el("div",{id:"diary-target"},"→ "+(config?.imaFolderName||"")));
  }

  const cntEl=el("span",{id:"diary-count"+(diaryText.length>MAX_CHARS*0.9?" warn":"")},
    diaryText.length+"/"+MAX_CHARS);
  const diarySec=el("div",{style:{flexShrink:"0"}},
    el("div",{id:"diary-header"},
      el("span",{className:"section-label"},"今日一頁"),
      el("div",{id:"diary-meta"},
        cntEl,
        el("button",{id:"btn-history",onClick:()=>setState({showHistory:!showHistory})},
          showHistory?"← 今日":"往期▾"))),
    diaryContent);

  const left=el("div",{id:"left"},goalSec,el("div",{className:"divider-line"}),
    bookSec,el("div",{className:"divider-line"}),diarySec);

  // ── Right column ──
  // Highlight
  let hlContent;
  if(wereadLoading){ hlContent=el("div",{style:{fontSize:"11px",color:"#bbb"}},"載入中…"); }
  else if(hl){
    const foot=el("div",{id:"hlfoot"},
      el("span",{id:"hlbook"},"——《"+hl.book+"》"));
    if(highlightTotal>1){
      foot.appendChild(el("button",{id:"btn-nexthl",
        onClick:()=>setState({hlIndex:(hlIndex+1)%highlights.length})},"換一條"));
    }
    hlContent=el("div",{},
      el("div",{id:"hltext"},hl.text),foot);
  } else {
    hlContent=el("div",{style:{fontSize:"11px",color:"#bbb",fontStyle:"italic"}},"暫無書摘，去微信讀書劃線吧");
  }
  const hlbox=el("div",{id:"hlbox"},
    el("div",{className:"lbl"},"今日書摘"),hlContent);

  // Stats
  const statData=[
    {lbl:"閱讀時間",val:stats?fmtMin(Math.round((stats.weekTime||0)/60)):"—"},
    {lbl:"閱讀天數",val:stats?(stats.weekDays||0)+"天":"—"},
  ];
  const grid=el("div",{id:"statgrid"});
  statData.forEach(s=>{
    grid.appendChild(el("div",{className:"statbox"},
      el("div",{className:"lbl"},s.lbl),
      el("div",{className:"val"},s.val)));
  });
  const statSec=el("div",{},el("div",{className:"section-label",style:{marginBottom:"8px"}},"本週統計"),grid);

  // Todos
  const todoList=el("div",{id:"todolist"});
  todos.forEach(todo=>{
    const ck="todo_"+todayKey()+"_"+todo.id;
    let checked=localStorage.getItem(ck)==="1";
    const check=el("span",{className:"todo-check",onClick:e=>{
      e.stopPropagation();
      if(todoEditId===todo.id) return;
      checked=!checked;
      localStorage.setItem(ck,checked?"1":"0");
      check.textContent=checked?"☑":"□";
      label.className="todo-text"+(checked?" done":"");
    }},checked?"☑":"□");
    const del=el("span",{className:"todo-del",onClick:e=>{
      e.stopPropagation();
      const next=todos.filter(t=>t.id!==todo.id);
      saveTodos(next);
      setState({todos:next,todoEditId:null});
    }},"×");
    let label;
    if(todoEditId===todo.id){
      label=el("input",{className:"todo-edit-input",type:"text",value:todo.text});
      label.addEventListener("keydown",e=>{
        if(e.key==="Enter") label.blur();
        if(e.key==="Escape") setState({todoEditId:null});
      });
      label.addEventListener("blur",()=>{
        const txt=label.value.trim();
        const next=txt?todos.map(t=>t.id===todo.id?{...t,text:txt}:t)
                       :todos.filter(t=>t.id!==todo.id);
        saveTodos(next);
        setState({todos:next,todoEditId:null});
      });
      requestAnimationFrame(()=>{ label.focus(); label.select(); });
    } else {
      label=el("span",{className:"todo-text"+(checked?" done":""),
        onClick:()=>setState({todoEditId:todo.id})},todo.text);
    }
    todoList.appendChild(el("div",{className:"todo"},check,label,del));
  });
  const addBtn=el("button",{className:"todo-add",onClick:()=>{
    const newId=todos.reduce((m,t)=>Math.max(m,t.id),-1)+1;
    const next=[...todos,{id:newId,text:""}];
    saveTodos(next);
    setState({todos:next,todoEditId:newId});
  }},"＋ 新增計劃");
  const todoSec=el("div",{style:{flex:"1"}},
    el("div",{className:"section-label",style:{marginBottom:"7px"}},"今日計劃"),
    todoList,addBtn);

  const right=el("div",{id:"right"},hlbox,el("div",{className:"divider-line"}),
    statSec,el("div",{className:"divider-line"}),todoSec);

  // ── Bottom ──
  const bottom=el("div",{id:"bottombar"},
    el("span",{},"在讀"+reading.length+" · 已讀"+done.length+" · 想讀"+want.length),
    el("button",{style:{fontSize:"8px",background:"transparent",border:"none",
      color:"#ccc",cursor:"pointer",fontFamily:"inherit"},
      onClick:()=>{ localStorage.removeItem("dashboard_config"); localStorage.removeItem("todos_list"); localStorage.removeItem(todayKey()); setState({config:null, diaryText:"", diarySaved:false, imaSynced:false, imaError:"", todos:DEFAULT_TODOS, todoEditId:null}); }},
      "重新設定"),
    el("span",{},"書房 v0.4"));

  return el("div",{id:"app"},topbar,
    el("div",{id:"main"},left,el("div",{id:"divider"}),right),
    bottom);
}

// ── Render ────────────────────────────────────────────────
function render(){
  const root=document.getElementById("app")||document.body.firstChild;
  const newApp=S.config ? renderMain() : renderSetup();
  newApp.id="app";
  if(document.getElementById("app")){
    document.body.replaceChild(newApp, document.getElementById("app"));
  } else {
    document.body.appendChild(newApp);
  }
}

render();
</script>
</body>
</html>
